services:
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: football-weather-jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SPARK_MASTER: "local[*]"
    command: bash -lc "python -m pip install -r /home/jovyan/work/requirements.txt && start-notebook.sh --ServerApp.token=''"
    working_dir: /home/jovyan/work
    volumes:
      - ./project_paths.py:/home/jovyan/work/project_paths.py:ro
      - ./pipeline_config.py:/home/jovyan/work/pipeline_config.py:ro
      - ./requirements.txt:/home/jovyan/work/requirements.txt:ro
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./outputs:/home/jovyan/work/outputs
      - ./docs:/home/jovyan/work/docs
    depends_on:
      kafka:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.7.0
    container_name: football-weather-kafka
    hostname: kafka
    user: "0:0"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENERS: "CONTROLLER://:9093,INTERNAL://:29092,EXTERNAL://:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  kafka-data:
